name: Fetch and Process FusionSolar Sites (API)

on:
  schedule:
    - cron: '5,35 3-19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Fetch FusionSolar data via API
        env:
          FUSIONSOLAR_API_USER: ${{ secrets.FUSIONSOLAR_API_USER }}
          FUSIONSOLAR_API_PASS: ${{ secrets.FUSIONSOLAR_API_PASS }}
        run: python fetch_fusionsolar_api.py

      - name: Process all sites
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python process_all_sites.py

      - name: Commit and push data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add sites/*/data/*.json data/raw/*.json
          git diff --quiet && git diff --staged --quiet && exit 0
          git commit -m "Update FusionSolar sites data - $(date +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --no-rebase -X ours && git push && break
            echo "Retry $i..."
            sleep 5
          done
