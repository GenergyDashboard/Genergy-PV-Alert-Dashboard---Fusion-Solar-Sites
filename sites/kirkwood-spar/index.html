<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirkwood Spar - PV Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1419; color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; margin-bottom: 8px; color: #fff; font-weight: 500; }
        .last-updated { color: #64748b; font-size: 0.85rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #1a2332 0%, #1e2936 100%); border-radius: 12px; padding: 20px 25px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); }
        .stat-label { color: #9ca3af; font-size: 0.7rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .stat-value { font-size: 2.8rem; font-weight: 700; margin-bottom: 8px; line-height: 1; }
        .stat-value.ok { color: #22c55e; } .stat-value.low { color: #fb923c; } .stat-value.offline { color: #ef4444; }
        .stat-sublabel { color: #6b7280; font-size: 0.85rem; }
        .chart-section { background: linear-gradient(135deg, #1a2332 0%, #1e2936 100%); border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .chart-title { font-size: 1.5rem; font-weight: 600; color: #fff; }
        .chart-controls { display: flex; gap: 10px; }
        .toggle-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(15, 20, 25, 0.4); color: #9ca3af; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.3s; }
        .toggle-btn:hover { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; color: #60a5fa; }
        .toggle-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        .chart-container { position: relative; height: 450px; }
        .more-dropdown { position: relative; display: inline-block; }
        .more-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(15, 20, 25, 0.4); color: #60a5fa; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.3s; }
        .more-btn:hover { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; }
        .more-menu { display: none; position: absolute; top: 100%; right: 0; margin-top: 6px; background: #1a2332; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5); z-index: 100; min-width: 170px; overflow: hidden; }
        .more-menu.show { display: block; }
        .more-menu button { display: block; width: 100%; padding: 12px 18px; background: transparent; border: none; color: #cbd5e1; font-size: 0.85rem; text-align: left; cursor: pointer; transition: background 0.15s; }
        .more-menu button:hover { background: rgba(59, 130, 246, 0.15); color: #fff; }
        .date-picker-row { display: none; align-items: center; gap: 10px; margin-top: 15px; padding: 14px 18px; background: rgba(10, 15, 26, 0.5); border-radius: 10px; flex-wrap: wrap; }
        .date-picker-row.show { display: flex; }
        .date-picker-row select { background: rgba(15, 20, 25, 0.8); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 6px; color: #e2e8f0; padding: 8px 12px; font-size: 0.9rem; cursor: pointer; appearance: auto; }
        .date-picker-row label { color: #9ca3af; font-size: 0.85rem; font-weight: 500; }
        .date-picker-row .go-btn { padding: 8px 18px; border-radius: 6px; border: none; background: #3b82f6; color: #fff; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .date-picker-row .go-btn:hover { background: #2563eb; }
        .loading { text-align: center; padding: 100px; font-size: 1.3rem; color: #94a3b8; }
        @media (max-width: 768px) { .chart-container { height: 350px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="siteName">Kirkwood Spar</h1>
            <div class="last-updated" id="lastUpdated">Loading...</div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Total Generation Today</div><div class="stat-value ok" id="totalKwh">-- kWh</div><div class="stat-sublabel" id="statusLabel">Loading...</div></div>
            <div class="stat-card"><div class="stat-label">Rolling Daily Average</div><div class="stat-value" id="avgKwh" style="color: #fff;">-- kWh</div><div class="stat-sublabel" id="avgSublabel">Typical day performance</div></div>
            <div class="stat-card"><div class="stat-label">Last Hour Updated</div><div class="stat-value" id="lastHour" style="color: #fff;">--:00</div><div class="stat-sublabel" id="lastHourKwh">-- kW generated</div></div>
            <div class="stat-card"><div class="stat-label">Status</div><div class="stat-value ok" id="status">--</div><div class="stat-sublabel" id="statusDetail">--</div></div>
        </div>
        <div class="chart-section">
            <div class="chart-header">
                <div class="chart-title">Hourly Generation</div>
                <div class="chart-controls">
                    <button class="toggle-btn active" onclick="switchChartMode('today', this)">Today</button>
                    <button class="toggle-btn" onclick="switchChartMode('average', this)">30-Day Average</button>
                    <div class="more-dropdown">
                        <button class="more-btn" onclick="toggleMore()">More &#9660;</button>
                        <div class="more-menu" id="moreMenu">
                            <button onclick="switchChartMode('history', this); closeMore()">Daily History</button>
                            <button onclick="showDatePicker(); closeMore()">View Past Day</button>
                            <button onclick="exportCSV(); closeMore()">Export CSV</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="date-picker-row" id="datePicker"><label>View past day:</label><select id="dateDay"></select><select id="dateMonth"></select><select id="dateYear"></select><button class="go-btn" onclick="goToPastDay()">View</button></div>
            <div class="chart-container"><canvas id="hourlyChart"></canvas></div>
        </div>
        <div id="dataLoading" class="loading">Loading data...</div>
    </div>
    <script>
        const SITE_CONFIG={name:"Kirkwood Spar",dataUrl:"./data/processed.json"};
        let dashboardData=null,hourlyChart=null,currentChartMode='today';
        Chart.defaults.devicePixelRatio=window.devicePixelRatio*2||2;
        loadData();setInterval(loadData,3600000);
        async function loadData(){try{const r=await fetch(SITE_CONFIG.dataUrl);if(!r.ok)throw new Error('Failed');dashboardData=await r.json();document.getElementById('dataLoading').style.display='none';updateDashboard();updateChart()}catch(e){console.error(e);document.getElementById('dataLoading').innerHTML=`<div style="color:#ef4444">Error: ${e.message}</div>`}}
        function updateDashboard(){const stats=dashboardData.stats_30day||{};document.getElementById('siteName').textContent=SITE_CONFIG.name;document.getElementById('lastUpdated').textContent=`Updated ${dashboardData.last_updated||'N/A'}`;const t=dashboardData.total_kwh||0,a=stats.daily_avg||0,sd=stats.sample_days||0,st=dashboardData.status||'offline';document.getElementById('totalKwh').textContent=t.toFixed(1)+' kWh';document.getElementById('totalKwh').className=`stat-value ${st}`;document.getElementById('avgKwh').textContent=a.toFixed(1)+' kWh';document.getElementById('avgSublabel').textContent=sd>0?`Based on ${sd} days of data`:'Collecting data...';const td=dashboardData.today||{},hp=td.hourly_pv||dashboardData.hourly_pv||[],lh=dashboardData.last_hour,ls=(lh!==undefined&&lh!==null)?lh:'--',lv=ls!=='--'?(hp[parseInt(ls)]||0):0;document.getElementById('lastHour').textContent=(ls!=='--'?String(ls).padStart(2,'0'):'--')+':00';document.getElementById('lastHourKwh').textContent=lv.toFixed(1)+' kW generated';document.getElementById('status').textContent=st.toUpperCase();document.getElementById('status').className=`stat-value ${st}`;const p=a>0?((t/a)*100).toFixed(0):0;document.getElementById('statusLabel').textContent=a>0?`${p}% of daily average`:'Collecting baseline data...';document.getElementById('statusDetail').textContent=st==='ok'?'Generating normally':st==='low'?'Below expected generation':'No recent data'}
        function truncateAtLastHour(arr){let l=0;for(let i=arr.length-1;i>=0;i--){if(arr[i]>0){l=i;break}}return arr.map((v,i)=>i<=l?v:null)}
        function updateChart(){const hours=Array.from({length:24},(_,i)=>i),td=dashboardData.today||{},hp=td.hourly_pv||dashboardData.hourly_pv||new Array(24).fill(0),ir=td.irradiation||dashboardData.irradiation||new Array(24).fill(0),stats=dashboardData.stats_30day||{},ctx=document.getElementById('hourlyChart').getContext('2d');if(hourlyChart)hourlyChart.destroy();const labels=hours.map(h=>(h<10?'0':'')+h+':00');let chartData,chartOptions;if(currentChartMode==='today'){chartData={labels,datasets:[{type:'line',label:'Irradiation (W/m²)',data:ir,backgroundColor:'rgba(133,77,14,0.6)',borderColor:'rgba(202,138,4,0.8)',borderWidth:1,fill:true,yAxisID:'y1',pointRadius:0,tension:0.4,order:3},{type:'line',label:'Predicted (Rolling Avg)',data:stats.hourly_avg||new Array(24).fill(0),borderColor:'rgba(96,165,250,0.7)',borderWidth:2,borderDash:[6,4],fill:false,pointRadius:0,tension:0.4,order:2},{type:'bar',label:'PV Generation (kW)',data:hp,backgroundColor:'#22c55e',borderColor:'#22c55e',borderWidth:0,barPercentage:0.9,categoryPercentage:0.95,order:1}]};chartOptions=buildChartOptions(true)}else if(currentChartMode==='average'){chartData={labels,datasets:[{type:'line',label:'Min',data:stats.hourly_min||new Array(24).fill(0),backgroundColor:'rgba(120,80,40,0.12)',borderColor:'rgba(180,140,60,0.8)',borderWidth:1.5,fill:'+1',pointRadius:0,tension:0.4,order:5},{type:'line',label:'Max',data:stats.hourly_max||new Array(24).fill(0),backgroundColor:'transparent',borderColor:'rgba(150,100,220,0.8)',borderWidth:1.5,pointRadius:0,tension:0.4,order:5},{type:'line',label:'P10-P90',data:stats.hourly_p10||new Array(24).fill(0),backgroundColor:'rgba(107,114,128,0.2)',borderColor:'rgba(107,114,128,0.4)',borderWidth:1,fill:'+1',pointRadius:0,tension:0.4,order:4},{type:'line',label:'',data:stats.hourly_p90||new Array(24).fill(0),backgroundColor:'transparent',borderColor:'rgba(107,114,128,0.4)',borderWidth:1,pointRadius:0,tension:0.4,order:4},{type:'line',label:'P25-P75',data:stats.hourly_p25||new Array(24).fill(0),backgroundColor:'rgba(34,197,94,0.2)',borderColor:'rgba(34,197,94,0.5)',borderWidth:1.5,fill:'+1',pointRadius:0,tension:0.4,order:3},{type:'line',label:'',data:stats.hourly_p75||new Array(24).fill(0),backgroundColor:'transparent',borderColor:'rgba(34,197,94,0.5)',borderWidth:1.5,pointRadius:0,tension:0.4,order:3},{type:'line',label:'Median (P50)',data:stats.hourly_avg||new Array(24).fill(0),borderColor:'#60a5fa',borderWidth:2.5,borderDash:[8,4],fill:false,pointRadius:0,tension:0.4,order:2},{type:'line',label:'Today Actual',data:truncateAtLastHour(hp),borderColor:'#22c55e',borderWidth:2,borderDash:[6,3],fill:false,pointRadius:0,tension:0.4,order:1}]};chartOptions=buildChartOptions(false)}else if(currentChartMode==='history'){const history=dashboardData.history||{},dates=Object.keys(history).sort(),totals=dates.map(d=>history[d].total_kwh||0),dailyAvg=stats.daily_avg||0;chartData={labels:dates.map(d=>{const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-ZA',{day:'numeric',month:'short'})}),datasets:[{type:'line',label:'Rolling Avg',data:new Array(dates.length).fill(dailyAvg),borderColor:'rgba(96,165,250,0.6)',borderWidth:2,borderDash:[6,4],fill:false,pointRadius:0,order:1},{type:'bar',label:'Daily Total (kWh)',data:totals,backgroundColor:totals.map(v=>v<dailyAvg*0.5?'#fb923c':'#22c55e'),borderWidth:0,barPercentage:0.8,categoryPercentage:0.9,order:2}]};chartOptions=buildChartOptions(false,true)}hourlyChart=new Chart(ctx,{type:'bar',data:chartData,options:chartOptions})}
        function buildChartOptions(showIrrad,isHistory=false){return{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',align:'center',labels:{color:'#9ca3af',font:{size:13},usePointStyle:true,padding:15,filter:i=>i.text!==''}},tooltip:{backgroundColor:'rgba(15,20,25,0.95)',titleColor:'#e2e8f0',bodyColor:'#cbd5e1',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,padding:12,displayColors:true,filter:i=>i.dataset.label!==''}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)',drawBorder:false},ticks:{color:'#6b7280',font:{size:12},maxRotation:isHistory?45:0}},y:{beginAtZero:true,position:'left',grid:{color:'rgba(255,255,255,0.05)',drawBorder:false},ticks:{color:'#6b7280',font:{size:12},callback:v=>v.toFixed(0)+(isHistory?'':' kW')},title:{display:true,text:isHistory?'Energy (kWh)':'Power (kW)',color:'#9ca3af',font:{size:11}}},...(showIrrad?{y1:{beginAtZero:true,position:'right',grid:{drawOnChartArea:false},ticks:{color:'#ca8a04',font:{size:12},callback:v=>v.toFixed(0)},title:{display:true,text:'Irradiation (W/m²)',color:'#ca8a04',font:{size:11}}}}:{})}}}
        function switchChartMode(m,b){currentChartMode=m;document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));if(b&&b.classList.contains('toggle-btn'))b.classList.add('active');updateChart()}
        function toggleMore(){document.getElementById('moreMenu').classList.toggle('show')}
        function closeMore(){document.getElementById('moreMenu').classList.remove('show')}
        function showDatePicker(){const p=document.getElementById('datePicker');p.classList.toggle('show');if(p.classList.contains('show')){const h=dashboardData.history||{},d=Object.keys(h).sort();if(!d.length)return;const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],ay=[...new Set(d.map(x=>x.slice(0,4)))].sort(),l=d[d.length-1],ys=document.getElementById('dateYear'),ms=document.getElementById('dateMonth'),ds=document.getElementById('dateDay');ys.innerHTML=ay.map(y=>`<option value="${y}" ${y===l.slice(0,4)?'selected':''}>${y}</option>`).join('');function uM(){const yr=ys.value,am=[...new Set(d.filter(x=>x.startsWith(yr)).map(x=>parseInt(x.slice(5,7))))].sort((a,b)=>a-b);ms.innerHTML=am.map(m=>`<option value="${m}" ${m===parseInt(l.slice(5,7))?'selected':''}>${months[m-1]}</option>`).join('');uD()}function uD(){const yr=ys.value,mo=String(ms.value).padStart(2,'0'),pf=yr+'-'+mo,ad=d.filter(x=>x.startsWith(pf)).map(x=>parseInt(x.slice(8,10))).sort((a,b)=>a-b),ld=parseInt(l.slice(8,10));ds.innerHTML=ad.map(x=>`<option value="${x}" ${x===ld?'selected':''}>${x}</option>`).join('')}ys.onchange=uM;ms.onchange=uD;uM()}}
        function goToPastDay(){viewPastDay(document.getElementById('dateYear').value+'-'+String(document.getElementById('dateMonth').value).padStart(2,'0')+'-'+String(document.getElementById('dateDay').value).padStart(2,'0'))}
        function viewPastDay(ds){if(!ds)return;const h=dashboardData.history||{},dd=h[ds];if(!dd){alert('No data for '+ds);return}currentChartMode='pastday';document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));const hours=Array.from({length:24},(_,i)=>i),labels=hours.map(h=>(h<10?'0':'')+h+':00'),stats=dashboardData.stats_30day||{},ctx=document.getElementById('hourlyChart').getContext('2d');if(hourlyChart)hourlyChart.destroy();const dh=dd.hourly||new Array(24).fill(0),di=dd.irradiation||new Array(24).fill(0),dt=new Date(ds+'T00:00:00'),dl=dt.toLocaleDateString('en-ZA',{weekday:'short',day:'numeric',month:'short',year:'numeric'});hourlyChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[{type:'line',label:'Irradiation (W/m²)',data:di,backgroundColor:'rgba(133,77,14,0.6)',borderColor:'rgba(202,138,4,0.8)',borderWidth:1,fill:true,yAxisID:'y1',pointRadius:0,tension:0.4,order:3},{type:'line',label:'Rolling Avg',data:stats.hourly_avg||new Array(24).fill(0),borderColor:'rgba(96,165,250,0.7)',borderWidth:2,borderDash:[6,4],fill:false,pointRadius:0,tension:0.4,order:2},{type:'bar',label:dl+' (kW)',data:dh,backgroundColor:'#22c55e',borderWidth:0,barPercentage:0.9,categoryPercentage:0.95,order:1}]},options:buildChartOptions(true)})}
        function exportCSV(){const h=dashboardData.history||{},stats=dashboardData.stats_30day||{},d=Object.keys(h).sort();if(!d.length){alert('No data');return}let csv='Date,Hour,PV_kWh,Irradiation_Wm2,Rolling_Avg_kW,Daily_Total_kWh\n';for(const dt of d){const dd=h[dt],hr=dd.hourly||[],ir=dd.irradiation||[],av=stats.hourly_avg||[];for(let i=0;i<24;i++){csv+=`${dt},${String(i).padStart(2,'0')}:00,${(hr[i]||0).toFixed(2)},${(ir[i]||0).toFixed(1)},${(av[i]||0).toFixed(2)},${i===0?(dd.total_kwh||0).toFixed(1):''}\n`}}const b=new Blob([csv],{type:'text/csv'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='Kirkwood_Spar_hourly_data.csv';a.click();URL.revokeObjectURL(u)}
        document.addEventListener('click',e=>{if(!e.target.closest('.more-dropdown'))closeMore()});
    </script>
</body>
</html>
